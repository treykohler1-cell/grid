<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grid Splitter</title>
<style>
  :root{
    --bg:#0b0b0c; --panel:#161618; --line:#2a2a2e;
    --txt:#f2f2f3; --muted:#9a9aa2; --accent:#2ec27e; --accent2:#249b63;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; min-height:100%;
  }
  header{padding:14px 16px 8px; text-align:center;}
  header h1{margin:0; font-size:18px; letter-spacing:.3px;}
  header p{margin:4px 0 0; font-size:12px; color:var(--muted);}

  #stage{
    flex:1; display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden; touch-action:none; min-height:220px;
    background:
      linear-gradient(45deg,#1a1a1c 25%,transparent 25%),
      linear-gradient(-45deg,#1a1a1c 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#1a1a1c 75%),
      linear-gradient(-45deg,transparent 75%,#1a1a1c 75%);
    background-size:20px 20px;
    background-position:0 0,0 10px,10px -10px,-10px 0;
    cursor:pointer;
    border-bottom:1px solid var(--line);
  }
  #stage.drag{outline:2px dashed var(--accent); outline-offset:-8px;}
  #wrap{position:relative; line-height:0; max-width:100%; max-height:100%;}
  canvas#preview{display:block; max-width:100%; max-height:60vh; }
  #cross{position:absolute; inset:0; pointer-events:none; display:none;}
  #cross .h,#cross .v{position:absolute; background:rgba(46,194,126,.85); box-shadow:0 0 0 1px rgba(0,0,0,.5);}
  #cross .h{left:0; right:0; height:2px; top:50%; transform:translateY(-1px);}
  #cross .v{top:0; bottom:0; width:2px; left:50%; transform:translateX(-1px);}
  #empty{color:var(--muted); font-size:14px; text-align:center; padding:0 30px;}
  #file{display:none;}

  .panel{padding:14px 16px calc(14px + env(safe-area-inset-bottom)); background:var(--panel);}
  .hint{font-size:11px; color:var(--muted); text-align:center; margin:0 0 12px;}
  .row{display:flex; gap:10px; margin-bottom:10px;}
  .row:last-child{margin-bottom:0;}
  button,label.btn{
    flex:1; border:none; border-radius:12px; padding:13px 12px;
    font-size:14px; font-weight:600; color:var(--txt);
    background:#26262a; cursor:pointer; text-align:center;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  button:active,label.btn:active{filter:brightness(1.3);}
  button.primary{background:var(--accent); color:#062;}
  button:disabled{opacity:.4; cursor:not-allowed;}

  #quads{display:none; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px;}
  .quad{background:#0f0f11; border:1px solid var(--line); border-radius:10px; padding:8px; text-align:center;}
  .quad canvas{width:100%; height:auto; display:block; border-radius:6px; background:
      linear-gradient(45deg,#1a1a1c 25%,transparent 25%),
      linear-gradient(-45deg,#1a1a1c 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#1a1a1c 75%),
      linear-gradient(-45deg,transparent 75%,#1a1a1c 75%);
    background-size:16px 16px;
    background-position:0 0,0 8px,8px -8px,-8px 0;
  }
  .quad .lbl{font-size:11px; color:var(--muted); margin:6px 0;}
  .quad button{width:100%; padding:8px; font-size:12px; border-radius:8px;}
</style>
</head>
<body>
<header>
  <h1>Grid Splitter</h1>
  <p>Load a 2x2 grid image, get 4 separate images out</p>
</header>

<div id="stage">
  <div id="empty">Tap to choose an image, drop one here, or paste (Ctrl/Cmd+V).<br>Everything runs on your device — nothing is uploaded.</div>
  <div id="wrap" style="display:none">
    <canvas id="preview"></canvas>
    <div id="cross"><div class="h"></div><div class="v"></div></div>
  </div>
</div>
<input id="file" type="file" accept="image/*">

<div class="panel">
  <p class="hint" id="hint">No image loaded yet.</p>

  <div id="quads">
    <div class="quad"><div class="lbl">Top Left</div><canvas id="q-tl"></canvas><button data-q="tl">Download</button></div>
    <div class="quad"><div class="lbl">Top Right</div><canvas id="q-tr"></canvas><button data-q="tr">Download</button></div>
    <div class="quad"><div class="lbl">Bottom Left</div><canvas id="q-bl"></canvas><button data-q="bl">Download</button></div>
    <div class="quad"><div class="lbl">Bottom Right</div><canvas id="q-br"></canvas><button data-q="br">Download</button></div>
  </div>

  <div class="row">
    <label class="btn" for="file">Load Image</label>
    <button id="downloadAll" class="primary" disabled>Download All 4</button>
  </div>
</div>

<script>
(function(){
  const stage = document.getElementById('stage');
  const empty = document.getElementById('empty');
  const wrap = document.getElementById('wrap');
  const preview = document.getElementById('preview');
  const cross = document.getElementById('cross');
  const fileInput = document.getElementById('file');
  const hint = document.getElementById('hint');
  const quadsEl = document.getElementById('quads');
  const downloadAllBtn = document.getElementById('downloadAll');
  const pctx = preview.getContext('2d');

  const quadCanvases = {
    tl: document.getElementById('q-tl'),
    tr: document.getElementById('q-tr'),
    bl: document.getElementById('q-bl'),
    br: document.getElementById('q-br'),
  };
  const quadNames = { tl:'TopLeft', tr:'TopRight', bl:'BottomLeft', br:'BottomRight' };
  const OUT_W = 1920, OUT_H = 1080;

  let baseName = 'image';
  let hasImage = false;

  function sanitize(name){
    return name.replace(/\.[^/.]+$/, '').replace(/[^a-z0-9_\-]+/gi, '_').replace(/^_+|_+$/g,'') || 'image';
  }

  function loadFile(file){
    if (!file || !file.type || !file.type.startsWith('image/')) return;
    baseName = sanitize(file.name || 'image');
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      onImageLoaded(img);
    };
    img.onerror = () => URL.revokeObjectURL(url);
    img.src = url;
  }

  const WHITE_MIN = 225;
  const WHITE_TOL = 18;
  const WHITE_FRAC = 0.9;

  function isWhite(r, g, b){
    return r >= WHITE_MIN && g >= WHITE_MIN && b >= WHITE_MIN &&
      (Math.max(r, g, b) - Math.min(r, g, b)) <= WHITE_TOL;
  }

  // fraction of white pixels along column x (sampling every `step` rows)
  function colWhiteFrac(data, w, h, x, step){
    let white = 0, total = 0;
    for (let y = 0; y < h; y += step){
      const idx = (y * w + x) * 4;
      if (isWhite(data[idx], data[idx+1], data[idx+2])) white++;
      total++;
    }
    return total ? white / total : 0;
  }

  // fraction of white pixels along row y (sampling every `step` cols)
  function rowWhiteFrac(data, w, h, y, step){
    let white = 0, total = 0;
    for (let x = 0; x < w; x += step){
      const idx = (y * w + x) * 4;
      if (isWhite(data[idx], data[idx+1], data[idx+2])) white++;
      total++;
    }
    return total ? white / total : 0;
  }

  // Detects outer white margins and a white gutter line running through the
  // middle of the image, so quadrants can be cropped to just the artwork.
  function detectBorders(data, w, h){
    const colStep = Math.max(1, Math.floor(h / 200));
    const rowStep = Math.max(1, Math.floor(w / 200));
    const cx = Math.floor(w / 2), cy = Math.floor(h / 2);

    let leftBorder = 0;
    while (leftBorder < cx && colWhiteFrac(data, w, h, leftBorder, colStep) >= WHITE_FRAC) leftBorder++;
    let rightBorder = w - 1;
    while (rightBorder > cx && colWhiteFrac(data, w, h, rightBorder, colStep) >= WHITE_FRAC) rightBorder--;
    rightBorder = w - 1 - rightBorder;

    let topBorder = 0;
    while (topBorder < cy && rowWhiteFrac(data, w, h, topBorder, rowStep) >= WHITE_FRAC) topBorder++;
    let bottomBorder = h - 1;
    while (bottomBorder > cy && rowWhiteFrac(data, w, h, bottomBorder, rowStep) >= WHITE_FRAC) bottomBorder--;
    bottomBorder = h - 1 - bottomBorder;

    let gLeft = cx, gRight = cx;
    if (colWhiteFrac(data, w, h, cx, colStep) >= WHITE_FRAC){
      while (gLeft > leftBorder && colWhiteFrac(data, w, h, gLeft - 1, colStep) >= WHITE_FRAC) gLeft--;
      while (gRight < w - 1 - rightBorder && colWhiteFrac(data, w, h, gRight, colStep) >= WHITE_FRAC) gRight++;
    }

    let gTop = cy, gBottom = cy;
    if (rowWhiteFrac(data, w, h, cy, rowStep) >= WHITE_FRAC){
      while (gTop > topBorder && rowWhiteFrac(data, w, h, gTop - 1, rowStep) >= WHITE_FRAC) gTop--;
      while (gBottom < h - 1 - bottomBorder && rowWhiteFrac(data, w, h, gBottom, rowStep) >= WHITE_FRAC) gBottom++;
    }

    return { leftBorder, rightBorder, topBorder, bottomBorder, gLeft, gRight, gTop, gBottom };
  }

  function onImageLoaded(img){
    hasImage = true;
    preview.width = img.width;
    preview.height = img.height;
    pctx.drawImage(img, 0, 0);

    empty.style.display = 'none';
    wrap.style.display = 'block';
    cross.style.display = 'block';

    const w = img.width, h = img.height;
    const { leftBorder, rightBorder, topBorder, bottomBorder, gLeft, gRight, gTop, gBottom } =
      detectBorders(pctx.getImageData(0, 0, w, h).data, w, h);

    const right = w - rightBorder;
    const bottom = h - bottomBorder;
    const rects = {
      tl: [leftBorder, topBorder, gLeft - leftBorder, gTop - topBorder],
      tr: [gRight, topBorder, right - gRight, gTop - topBorder],
      bl: [leftBorder, gBottom, gLeft - leftBorder, bottom - gBottom],
      br: [gRight, gBottom, right - gRight, bottom - gBottom],
    };

    Object.keys(rects).forEach(key => {
      const [sx, sy, sw, sh] = rects[key];
      const c = quadCanvases[key];
      c.width = OUT_W;
      c.height = OUT_H;
      const ctx = c.getContext('2d');
      ctx.drawImage(preview, sx, sy, sw, sh, 0, 0, OUT_W, OUT_H);
    });

    const trimmed = gLeft < gRight || gTop < gBottom || leftBorder || rightBorder || topBorder || bottomBorder;
    quadsEl.style.display = 'grid';
    downloadAllBtn.disabled = false;
    hint.textContent = `Loaded ${w}×${h}px.${trimmed ? ' White borders trimmed —' : ''} Each quadrant exports stretched to ${OUT_W}×${OUT_H} (16:9).`;
  }

  function downloadQuad(key, delayMs){
    return new Promise(resolve => {
      const go = () => {
        quadCanvases[key].toBlob(blob => {
          if (!blob) return resolve();
          const a = document.createElement('a');
          const url = URL.createObjectURL(blob);
          a.href = url;
          a.download = `${quadNames[key]}_${baseName}.png`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 2000);
          resolve();
        }, 'image/png');
      };
      if (delayMs) setTimeout(go, delayMs); else go();
    });
  }

  document.querySelectorAll('.quad button').forEach(btn => {
    btn.addEventListener('click', () => downloadQuad(btn.dataset.q, 0));
  });

  downloadAllBtn.addEventListener('click', async () => {
    if (!hasImage) return;
    const keys = ['tl', 'tr', 'bl', 'br'];
    for (let i = 0; i < keys.length; i++){
      await downloadQuad(keys[i], i === 0 ? 0 : 250);
    }
  });

  stage.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    if (e.target.files && e.target.files[0]) loadFile(e.target.files[0]);
  });

  ['dragenter','dragover'].forEach(evt => {
    stage.addEventListener(evt, e => { e.preventDefault(); stage.classList.add('drag'); });
  });
  ['dragleave','drop'].forEach(evt => {
    stage.addEventListener(evt, e => { e.preventDefault(); stage.classList.remove('drag'); });
  });
  stage.addEventListener('drop', e => {
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) loadFile(file);
  });

  window.addEventListener('paste', e => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const item of items){
      if (item.type && item.type.startsWith('image/')){
        const file = item.getAsFile();
        if (file) { loadFile(file); break; }
      }
    }
  });
})();
</script>
</body>
</html>
